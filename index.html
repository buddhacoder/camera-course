<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Camera Course · Photography & Videography for YouTube</title>
  <meta name="description" content="A complete interactive course on photography and videography — built around the Sony ZV-E10 for YouTube creators.">
  
  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel standalone (compiles JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; background: #F5EFE0; -webkit-font-smoothing: antialiased; }
    .font-display { font-family: 'Playfair Display', serif; }
    .font-body { font-family: 'Lora', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    
    .drop-cap::first-letter {
      font-family: 'Playfair Display', serif;
      font-size: 5rem; font-weight: 900; float: left;
      line-height: 0.85; margin-right: 0.5rem; margin-top: 0.5rem;
      color: #8a6d2c;
    }
    .ornament::before, .ornament::after {
      content: "✦"; margin: 0 1rem; color: #8a6d2c; opacity: 0.6;
    }
    .grain {
      position: absolute; inset: 0; pointer-events: none; opacity: 0.4; mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
    }
    input[type="range"].gold-slider {
      -webkit-appearance: none; appearance: none; height: 4px;
      background: linear-gradient(to right, #8a6d2c, #c8a04d);
      border-radius: 2px; outline: none;
    }
    input[type="range"].gold-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 22px; height: 22px;
      border-radius: 50%; background: #1a1410; border: 2px solid #c8a04d; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input[type="range"].gold-slider::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%;
      background: #1a1410; border: 2px solid #c8a04d; cursor: pointer;
    }
    input[type="range"].kelvin-slider {
      -webkit-appearance: none; appearance: none; height: 8px;
      background: linear-gradient(to right, #ff8a3c 0%, #ffd599 25%, #ffffff 50%, #cce0ff 75%, #5a9fff 100%);
      border-radius: 4px; outline: none;
    }
    input[type="range"].kelvin-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 24px; height: 24px;
      border-radius: 50%; background: #1a1410; border: 2px solid #c8a04d; cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,160,77,0.4); }
      50% { box-shadow: 0 0 0 12px rgba(200,160,77,0); }
    }
    .pulse-glow { animation: pulse-glow 2.5s ease-in-out infinite; }
    
    /* Loading state */
    .initial-loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #F5EFE0; z-index: 9999; flex-direction: column;
    }
    .initial-loader .spinner {
      width: 32px; height: 32px; border: 2px solid #D4C9A8;
      border-top-color: #8a6d2c; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Loading state shown until React mounts -->
  <div id="loader" class="initial-loader">
    <div class="spinner"></div>
    <div class="font-mono text-xs mt-4" style="color: #8a6d2c; letter-spacing: 0.3em;">LOADING THE CAMERA COURSE</div>
  </div>
  
  <div id="root"></div>
  
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    
    // ========================================================================
    // COLOR TOKENS
    // ========================================================================
    const c = {
      cream: '#F5EFE0', paper: '#FAF6EC', ink: '#1A1410', inkSoft: '#3D3324',
      gold: '#8a6d2c', goldBright: '#c8a04d', rust: '#9A4A2C', border: '#D4C9A8',
      sonyYellow: '#F0C800', sonyBg: '#1c1c1e',
    };

    // ========================================================================
    // ICONS (inline SVG)
    // ========================================================================
    const Icon = ({ children, size = 16, color = 'currentColor', className = '' }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} 
        strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const Check = (p) => <Icon {...p}><polyline points="20 6 9 17 4 12"/></Icon>;
    const X = (p) => <Icon {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"/></Icon>;
    const ChevronUp = (p) => <Icon {...p}><polyline points="18 15 12 9 6 15"/></Icon>;
    const ChevronDown = (p) => <Icon {...p}><polyline points="6 9 12 15 18 9"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></Icon>;
    const AlertTriangle = (p) => <Icon {...p}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Icon>;
    const BookmarkCheck = (p) => <Icon {...p}><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/><polyline points="9 10 11 12 15 8"/></Icon>;
    const Home = (p) => <Icon {...p}><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></Icon>;

    // ========================================================================
    // SHARED COMPONENTS
    // ========================================================================
    const GlossaryTerm = ({ term, def }) => {
      const [show, setShow] = useState(false);
      return (
        <span className="relative inline-block border-b border-dashed cursor-help" 
          style={{ borderColor: c.gold, color: 'inherit' }}
          onMouseEnter={() => setShow(true)}
          onMouseLeave={() => setShow(false)}>
          {term}
          {show && (
            <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 p-3 font-body z-50 rounded-sm shadow-xl text-left font-normal"
              style={{ background: c.ink, color: c.cream, border: `1px solid ${c.gold}`, lineHeight: '1.4', fontSize: '0.85rem' }}>
              <span className="block font-mono text-[10px] tracking-wider mb-1" style={{ color: c.goldBright }}>GLOSSARY</span>
              {def}
              <span className="absolute top-full left-1/2 -translate-x-1/2 w-0 h-0 border-4 border-transparent"
                style={{ borderTopColor: c.gold }}></span>
            </span>
          )}
        </span>
      );
    };

    const SectionHeader = ({ numeral, title, subtitle }) => (
      <div className="text-center mb-8 md:mb-12 section-jump-target scroll-mt-24">
        <div className="font-mono text-xs tracking-[0.3em] mb-3" style={{ color: c.gold }}>
          CHAPTER {numeral}
        </div>
        <h2 className="font-display text-4xl md:text-6xl font-bold mb-3 leading-tight" style={{ color: c.ink }}>
          {title}
        </h2>
        {subtitle && (
          <p className="font-body italic text-lg max-w-2xl mx-auto" style={{ color: c.inkSoft }}>{subtitle}</p>
        )}
      </div>
    );

    const MemoryAnchor = ({ children }) => (
      <div className="my-8 mx-auto max-w-2xl relative">
        <div className="border-2 px-6 py-5 md:px-8 md:py-6"
          style={{ borderColor: c.gold, background: 'rgba(200,160,77,0.08)' }}>
          <div className="font-mono text-[10px] tracking-[0.3em] mb-2" style={{ color: c.gold }}>
            ✦ MEMORY ANCHOR ✦
          </div>
          <div className="font-display text-xl md:text-2xl italic font-semibold" style={{ color: c.ink }}>
            {children}
          </div>
        </div>
      </div>
    );

    const CreatorNote = ({ children }) => (
      <div className="my-8 mx-auto max-w-3xl">
        <div className="rounded-sm p-5 md:p-6 relative" 
          style={{ 
            background: 'linear-gradient(135deg, rgba(200,160,77,0.08) 0%, rgba(154,74,44,0.04) 100%)', 
            border: `1px solid ${c.gold}`,
            borderLeftWidth: '4px'
          }}>
          <div className="flex items-start gap-4">
            <div className="w-12 h-12 rounded-full flex-shrink-0 flex items-center justify-center font-mono text-lg"
              style={{ background: c.ink, color: c.goldBright, fontStyle: 'italic' }}>
              "
            </div>
            <div className="flex-1">
              <div className="font-mono text-[10px] tracking-[0.25em] mb-2" style={{ color: c.gold }}>
                NOTE FROM A CINEMATIC VLOGGER · ~1M SUBSCRIBERS
              </div>
              <div className="font-body text-base md:text-lg italic leading-relaxed" style={{ color: c.ink }}>
                {children}
              </div>
            </div>
          </div>
        </div>
      </div>
    );

    const Slider = ({ value, min, max, step, onChange, label, displayValue, displayUnit, sliderClass = 'gold-slider' }) => (
      <div className="my-4">
        <div className="flex justify-between items-baseline mb-2">
          <span className="font-mono text-xs tracking-wider uppercase" style={{ color: c.inkSoft }}>{label}</span>
          <span className="font-display text-2xl md:text-3xl font-bold" style={{ color: c.ink }}>
            {displayValue}<span className="font-mono text-sm ml-1" style={{ color: c.gold }}>{displayUnit}</span>
          </span>
        </div>
        <input type="range" className={sliderClass + ' w-full'} min={min} max={max} step={step}
          value={value} onChange={(e) => onChange(parseFloat(e.target.value))} />
      </div>
    );

    // ========================================================================
    // VOLUME I VISUALIZATIONS
    // ========================================================================
    const FocalLengthVisualizer = () => {
      const [focal, setFocal] = useState(11);
      const sensorWidth = 23.5;
      const aov = 2 * Math.atan(sensorWidth / (2 * focal)) * (180 / Math.PI);
      const fullFrameEquiv = focal * 1.5;
      const zoom = focal / 11;
      const labelFor = (f) => f <= 14 ? 'Ultra-Wide' : f <= 24 ? 'Wide' : f <= 50 ? 'Normal' : f <= 85 ? 'Short Telephoto' : f <= 135 ? 'Telephoto' : 'Long Telephoto';

      return (
        <div className="my-8">
          <div className="relative mx-auto rounded-sm overflow-hidden border-4 shadow-2xl"
            style={{ maxWidth: '600px', aspectRatio: '16/9', borderColor: c.ink,
              background: 'linear-gradient(180deg, #b8d4e3 0%, #d4c4a3 50%, #8b7355 100%)' }}>
            <div className="absolute inset-0 flex items-end justify-center"
              style={{ transform: `scale(${zoom})`, transformOrigin: '50% 75%', transition: 'transform 0.4s cubic-bezier(0.4,0,0.2,1)' }}>
              <svg viewBox="0 0 600 340" className="w-full h-full">
                <polygon points="0,180 80,140 150,170 230,120 320,160 400,130 500,170 600,150 600,250 0,250" fill="#6b7d8e" opacity="0.6" />
                <g fill="#4a5d3e">
                  <polygon points="50,220 70,180 90,220" />
                  <polygon points="120,225 140,185 160,225" />
                  <polygon points="450,220 470,180 490,220" />
                  <polygon points="520,225 540,185 560,225" />
                </g>
                <rect x="0" y="240" width="600" height="100" fill="#9a8160" />
                <g transform="translate(300, 240)">
                  <circle cx="0" cy="-60" r="12" fill="#1A1410" />
                  <path d="M -10,-48 L 10,-48 L 14,-10 L -14,-10 Z" fill="#1A1410" />
                  <rect x="-8" y="-10" width="6" height="20" fill="#1A1410" />
                  <rect x="2" y="-10" width="6" height="20" fill="#1A1410" />
                </g>
              </svg>
            </div>
            <div className="absolute top-2 left-2 font-mono text-[10px] px-2 py-1 rounded-sm"
              style={{ background: 'rgba(26,20,16,0.75)', color: c.goldBright }}>
              {focal}mm · {labelFor(focal)}
            </div>
            <div className="absolute top-2 right-2 font-mono text-[10px] px-2 py-1 rounded-sm"
              style={{ background: 'rgba(26,20,16,0.75)', color: c.goldBright }}>
              AOV: {aov.toFixed(0)}°
            </div>
          </div>
          <div className="max-w-xl mx-auto mt-6">
            <Slider value={focal} min={11} max={200} step={1} onChange={setFocal}
              label="Focal Length" displayValue={focal} displayUnit="mm" />
            <div className="flex justify-between font-mono text-[10px] mt-1" style={{ color: c.inkSoft }}>
              <span>11mm (your prime)</span><span>50mm (kit max)</span><span>200mm (telephoto)</span>
            </div>
            <div className="mt-6 p-4 rounded-sm font-body text-sm md:text-base"
              style={{ background: c.paper, border: `1px solid ${c.border}`, color: c.inkSoft }}>
              <strong style={{ color: c.ink }}>Stop fighting your lens:</strong> Notice how fast that window shrinks as you slide the numbers up? At <span className="font-mono" style={{ color: c.gold }}>{focal}mm</span>, you only get a <span className="font-mono">{aov.toFixed(0)}°</span> slice of your room. This is the exact reason many creators waste money and quit in frustration: they buy a recommended "50mm" lens, point it at themselves, and realize their nose takes up the entire video. Because the ZV-E10 uses a smaller <GlossaryTerm term="APS-C sensor" def="A medium-sized sensor. Smaller than 'full frame' but way bigger than a phone sensor. It's the industry sweet-spot for affordable, high-quality video." />, it physically crops the edges off the image, acting like a permanent 1.5x zoom (the "<GlossaryTerm term="crop factor" def="The magnification effect caused by using a smaller sensor. For Sony APS-C, multiply your lens mm by 1.5 to get the equivalent view." />"). The secret? You have to cheat. By starting with an ultra-wide 11mm lens, the camera's built-in zoom simply crops it down into a comfortable, normal view. It effortlessly neutralizes the trap, letting you shoot perfectly framed vlogs at arm's length without dislocating your shoulder.
            </div>
          </div>
        </div>
      );
    };

    const ApertureVisualizer = () => {
      const fStops = [1.4, 1.8, 2.0, 2.8, 4.0, 5.6, 8, 11, 16];
      const [idx, setIdx] = useState(1);
      const f = fStops[idx];
      const irisOpen = (1 / f) * 100;
      const irisRadius = 8 + (irisOpen * 0.7);
      const blur = Math.max(0, 20 / f - 0.5);
      const lightLevel = (Math.log2(16 / f) + 1) * 12;

      return (
        <div className="my-8">
          <div className="grid md:grid-cols-2 gap-6 max-w-4xl mx-auto">
            <div className="relative rounded-sm overflow-hidden border-2 p-4 flex items-center justify-center"
              style={{ borderColor: c.ink, background: '#0a0805', aspectRatio: '1' }}>
              <svg viewBox="-50 -50 100 100" className="w-full h-full max-w-[280px]">
                <defs>
                  <radialGradient id="lensGlow">
                    <stop offset="0%" stopColor="#c8a04d" stopOpacity="0.9" />
                    <stop offset="60%" stopColor="#8a6d2c" stopOpacity="0.4" />
                    <stop offset="100%" stopColor="#1a1410" stopOpacity="0" />
                  </radialGradient>
                </defs>
                <circle cx="0" cy="0" r="48" fill="#0a0805" />
                <circle cx="0" cy="0" r={irisRadius * 1.5} fill="url(#lensGlow)" style={{ transition: 'all 0.4s ease-out' }} />
                {[...Array(7)].map((_, i) => (
                  <g key={i} transform={`rotate(${(i * 360) / 7})`}>
                    <path d={`M ${irisRadius},0 L 48,28 A 48,48 0 0 1 24,42 Z`} fill="#2a2218" stroke="#1a1410" strokeWidth="0.3" style={{ transition: 'all 0.4s ease-out' }} />
                  </g>
                ))}
              </svg>
              <div className="absolute bottom-2 left-2 font-mono text-xs" style={{ color: c.goldBright }}>f/{f}</div>
            </div>
            <div className="relative rounded-sm overflow-hidden border-2" style={{ borderColor: c.ink, aspectRatio: '1' }}>
              <div className="absolute inset-0" style={{
                filter: `blur(${blur}px) brightness(${1 + lightLevel/200})`, transition: 'filter 0.4s ease-out',
                background: 'radial-gradient(circle at 30% 30%, #d4a373 0%, #8b6f47 30%, #3d2f1a 70%, #1a1410 100%)'
              }}>
                <svg viewBox="0 0 100 100" className="w-full h-full">
                  {[{cx:15,cy:20,r:4,c:'#f0d894'},{cx:80,cy:15,r:6,c:'#f5e0a0'},{cx:25,cy:75,r:5,c:'#e8c478'},{cx:70,cy:80,r:4,c:'#d9b366'},{cx:50,cy:35,r:3,c:'#f0d894'},{cx:90,cy:50,r:4,c:'#e8c478'},{cx:10,cy:50,r:3,c:'#d9b366'}].map((d, i) => (
                    <circle key={i} cx={d.cx} cy={d.cy} r={d.r} fill={d.c} opacity="0.85" />
                  ))}
                </svg>
              </div>
              <div className="absolute inset-0 flex items-center justify-center">
                <svg viewBox="0 0 100 100" className="w-2/3 h-2/3">
                  <ellipse cx="50" cy="35" rx="14" ry="16" fill="#1a1410" />
                  <path d="M 30,90 Q 30,55 50,55 Q 70,55 70,90 Z" fill="#1a1410" />
                </svg>
              </div>
              <div className="absolute top-2 left-2 font-mono text-[10px] px-2 py-1 rounded-sm"
                style={{ background: 'rgba(26,20,16,0.85)', color: c.goldBright }}>simulated photo</div>
            </div>
          </div>
          <div className="max-w-xl mx-auto mt-6">
            <Slider value={idx} min={0} max={fStops.length - 1} step={1} onChange={setIdx}
              label="Aperture" displayValue={`f/${f}`} displayUnit="" />
            <div className="flex justify-between font-mono text-[10px] mt-1" style={{ color: c.inkSoft }}>
              <span>f/1.4 (huge eye)</span><span>f/5.6 (kit lens max)</span><span>f/16 (pinhole)</span>
            </div>
            <div className="mt-6 p-4 rounded-sm font-body text-sm md:text-base"
              style={{ background: c.paper, border: `1px solid ${c.border}`, color: c.inkSoft }}>
              <strong style={{ color: c.ink }}>The fraction trick:</strong> The "f" literally means <em>focal length</em>, and "/" means <em>divided by</em>. So <span className="font-mono"><GlossaryTerm term="f/1.8" def="A very large aperture. Lets in a ton of light and totally blurs out the background. Great for dim rooms." /></span> means the opening is the focal length divided by 1.8. <span className="font-mono"><GlossaryTerm term="f/16" def="A very small aperture opening. Lets in very little light but keeps everything from front to back in focus." /></span> means divided by 16. Just like <em>1/2 of a pizza is bigger than 1/16 of a pizza</em> — bigger denominator means smaller slice.
            </div>
          </div>
        </div>
      );
    };

    const ShutterVisualizer = () => {
      const speeds = [
        {val:'1/4000',blur:0},{val:'1/1000',blur:1},{val:'1/500',blur:2},{val:'1/250',blur:4},
        {val:'1/125',blur:8},{val:'1/60',blur:16},{val:'1/30',blur:30},{val:'1/15',blur:50},
        {val:'1/8',blur:80},{val:'1/2',blur:140},{val:'1s',blur:200}
      ];
      const [idx, setIdx] = useState(4);
      const speed = speeds[idx];

      return (
        <div className="my-8">
          <div className="relative mx-auto rounded-sm overflow-hidden border-4"
            style={{ maxWidth: '600px', aspectRatio: '16/9', borderColor: c.ink, background: '#d4c4a3' }}>
            <svg viewBox="0 0 600 340" className="w-full h-full">
              <rect x="0" y="0" width="600" height="220" fill="#a8b8c4" />
              <rect x="0" y="220" width="600" height="120" fill="#8a7355" />
              <line x1="0" y1="280" x2="600" y2="280" stroke="#5d4a30" strokeWidth="2" strokeDasharray="20,15" opacity="0.5" />
              {[...Array(Math.min(8, Math.ceil(speed.blur / 20) + 1))].map((_, i) => {
                const offset = -i * (speed.blur / 8);
                const opacity = (1 - i / 8) * 0.3;
                return (
                  <g key={i} transform={`translate(${300 + offset}, 240)`} opacity={opacity}>
                    <circle cx="0" cy="-50" r="10" fill="#1A1410" />
                    <path d="M -8,-40 L 8,-40 L 12,-5 L -12,-5 Z" fill="#1A1410" />
                    <rect x="-6" y="-5" width="5" height="18" fill="#1A1410" />
                    <rect x="1" y="-5" width="5" height="18" fill="#1A1410" />
                  </g>
                );
              })}
              <g transform="translate(300, 240)">
                <circle cx="0" cy="-50" r="10" fill="#1A1410" />
                <path d="M -8,-40 L 8,-40 L 12,-5 L -12,-5 Z" fill="#1A1410" />
                <rect x="-6" y="-5" width="5" height="18" fill="#1A1410" />
                <rect x="1" y="-5" width="5" height="18" fill="#1A1410" />
              </g>
            </svg>
            <div className="absolute top-2 left-2 font-mono text-[10px] px-2 py-1 rounded-sm"
              style={{ background: 'rgba(26,20,16,0.75)', color: c.goldBright }}>
              shutter: {speed.val}s
            </div>
          </div>
          <div className="max-w-xl mx-auto mt-6">
            <Slider value={idx} min={0} max={speeds.length - 1} step={1} onChange={setIdx}
              label="Shutter Speed" displayValue={speed.val} displayUnit="sec" />
            <div className="flex justify-between font-mono text-[10px] mt-1" style={{ color: c.inkSoft }}>
              <span>1/4000 (freeze)</span><span>1/60 (handheld min)</span><span>1s (long exposure)</span>
            </div>
            <div className="mt-6 p-4 rounded-sm font-body text-sm md:text-base"
              style={{ background: c.paper, border: `1px solid ${c.border}`, color: c.inkSoft }}>
              <strong style={{ color: c.ink }}>The window metaphor:</strong> Shutter speed is how long the camera's "eye" stays open. Brief blink (1/1000s) freezes a hummingbird's wing. Long stare (1s) turns a waterfall into silk. <strong style={{ color: c.rust }}>For YouTube video at 24fps, set shutter to 1/50. At 30fps, use 1/60. At 60fps, use 1/125.</strong> That's the "180° rule" — shutter ≈ 2× your frame rate gives natural motion blur.
            </div>
          </div>
        </div>
      );
    };

    const ISOVisualizer = () => {
      const isos = [100, 200, 400, 800, 1600, 3200, 6400, 12800, 25600];
      const [idx, setIdx] = useState(2);
      const iso = isos[idx];
      const canvasRef = useRef(null);
      const brightness = 0.5 + (idx * 0.1);
      const noiseAmount = Math.max(0, (idx - 2) * 18);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;
        const grad = ctx.createLinearGradient(0, 0, 0, h);
        grad.addColorStop(0, `rgb(${80*brightness}, ${100*brightness}, ${130*brightness})`);
        grad.addColorStop(0.6, `rgb(${140*brightness}, ${110*brightness}, ${80*brightness})`);
        grad.addColorStop(1, `rgb(${60*brightness}, ${50*brightness}, ${40*brightness})`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, w, h);
        ctx.fillStyle = `rgb(${30*brightness}, ${25*brightness}, ${20*brightness})`;
        ctx.beginPath();
        ctx.arc(w/2, h*0.45, 18, 0, Math.PI*2);
        ctx.fill();
        ctx.fillRect(w/2 - 25, h*0.5, 50, 60);
        if (noiseAmount > 0) {
          const imgData = ctx.getImageData(0, 0, w, h);
          const data = imgData.data;
          for (let i = 0; i < data.length; i += 4) {
            const noise = (Math.random() - 0.5) * noiseAmount * 2;
            data[i] = Math.max(0, Math.min(255, data[i] + noise));
            data[i+1] = Math.max(0, Math.min(255, data[i+1] + noise));
            data[i+2] = Math.max(0, Math.min(255, data[i+2] + noise));
          }
          ctx.putImageData(imgData, 0, 0);
        }
      }, [iso, brightness, noiseAmount]);

      return (
        <div className="my-8">
          <div className="relative mx-auto rounded-sm overflow-hidden border-4"
            style={{ maxWidth: '600px', aspectRatio: '16/9', borderColor: c.ink }}>
            <canvas ref={canvasRef} width={600} height={340} className="w-full h-full block" />
            <div className="absolute top-2 left-2 font-mono text-[10px] px-2 py-1 rounded-sm"
              style={{ background: 'rgba(26,20,16,0.85)', color: c.goldBright }}>ISO {iso}</div>
          </div>
          <div className="max-w-xl mx-auto mt-6">
            <Slider value={idx} min={0} max={isos.length - 1} step={1} onChange={setIdx}
              label="ISO Sensitivity" displayValue={`ISO ${iso}`} displayUnit="" />
            <div className="flex justify-between font-mono text-[10px] mt-1" style={{ color: c.inkSoft }}>
              <span>100 (clean)</span><span>1600 (still good)</span><span>25600 (mosh pit)</span>
            </div>
            <div className="mt-6 p-4 rounded-sm font-body text-sm md:text-base"
              style={{ background: c.paper, border: `1px solid ${c.border}`, color: c.inkSoft }}>
              <strong style={{ color: c.ink }}>The volume knob:</strong> ISO is amplification. Low ISO = the sensor whispers (clean). High ISO = the sensor shouts (loud, but you also hear the static). Each doubling is "one stop" of brightness. <strong>Always pin ISO as low as the scene allows.</strong>
            </div>
          </div>
        </div>
      );
    };

    const ExposurePlayground = () => {
      const [aperture, setAperture] = useState(2.8);
      const [shutterIdx, setShutterIdx] = useState(5);
      const [iso, setIso] = useState(2);
      const shutterValues = [1/4000,1/2000,1/1000,1/500,1/250,1/125,1/60,1/30,1/15,1/8,1/4,1/2,1];
      const shutterLabels = ['1/4000','1/2000','1/1000','1/500','1/250','1/125','1/60','1/30','1/15','1/8','1/4','1/2','1s'];
      const isoValues = [100,200,400,800,1600,3200,6400,12800];
      const shutterSec = shutterValues[shutterIdx];
      const isoVal = isoValues[iso];
      const ev = Math.log2((aperture * aperture) / shutterSec) - Math.log2(isoVal / 100);
      const targetEV = 8;
      const exposureDiff = ev - targetEV;
      let verdict, verdictColor;
      if (Math.abs(exposureDiff) < 0.5) { verdict = 'PERFECT EXPOSURE'; verdictColor = '#3a6b3a'; }
      else if (exposureDiff > 3) { verdict = 'FAR TOO DARK'; verdictColor = '#5a2020'; }
      else if (exposureDiff > 1) { verdict = 'TOO DARK'; verdictColor = '#7a4a2a'; }
      else if (exposureDiff < -3) { verdict = 'BLOWN OUT'; verdictColor = '#5a2020'; }
      else { verdict = 'TOO BRIGHT'; verdictColor = '#7a4a2a'; }
      const sceneBrightness = Math.pow(2, -exposureDiff) * 0.5;
      const clamped = Math.max(0.05, Math.min(2.5, sceneBrightness));
      const bgBlur = Math.max(0, 12 / aperture - 0.5);
      const motionBlur = Math.max(0, shutterSec * 30);
      const noiseOpacity = Math.max(0, (iso - 2) * 0.08);
      const reset = () => { setAperture(2.8); setShutterIdx(5); setIso(2); };

      return (
        <div className="my-8">
          <div className="grid lg:grid-cols-2 gap-6 max-w-5xl mx-auto">
            <div className="relative rounded-sm overflow-hidden border-4 shadow-2xl"
              style={{ borderColor: c.ink, aspectRatio: '4/3' }}>
              <div className="absolute inset-0" style={{
                filter: `blur(${bgBlur}px) brightness(${clamped})`,
                background: 'linear-gradient(180deg, #b8d4e3 0%, #d4c4a3 50%, #6b5a3d 100%)',
                transition: 'filter 0.3s'
              }}>
                <svg viewBox="0 0 400 300" className="w-full h-full">
                  <polygon points="0,180 80,140 150,170 230,120 320,160 400,150 400,230 0,230" fill="#7d8e9e" opacity="0.6" />
                  <rect x="0" y="220" width="400" height="80" fill="#8a7050" />
                </svg>
              </div>
              <div className="absolute inset-0 flex items-end justify-center pb-12"
                style={{ filter: `brightness(${clamped})`, transition: 'filter 0.3s' }}>
                <svg viewBox="0 0 200 200" className="w-1/2 h-auto">
                  {motionBlur > 1 && [...Array(5)].map((_, i) => (
                    <g key={i} opacity={(1 - i/5) * 0.3} transform={`translate(${-i * motionBlur/2}, 0)`}>
                      <circle cx="100" cy="60" r="22" fill="#1a1410" />
                      <path d="M 70,80 Q 70,140 100,140 Q 130,140 130,80 Z" fill="#1a1410" />
                    </g>
                  ))}
                  <circle cx="100" cy="60" r="22" fill="#1a1410" />
                  <path d="M 70,80 Q 70,140 100,140 Q 130,140 130,80 Z" fill="#1a1410" />
                </svg>
              </div>
              <div className="absolute inset-0 grain" style={{ opacity: noiseOpacity }} />
              <div className="absolute bottom-2 left-2 right-2 font-mono text-xs px-3 py-2 rounded-sm flex justify-between items-center"
                style={{ background: 'rgba(26,20,16,0.85)', color: c.goldBright }}>
                <span>EV {ev.toFixed(1)}</span>
                <span style={{ color: verdictColor === '#3a6b3a' ? '#a8d4a8' : verdictColor === '#5a2020' ? '#ff8a8a' : '#f0c878' }}>{verdict}</span>
              </div>
            </div>
            <div className="p-4 md:p-6 rounded-sm" style={{ background: c.paper, border: `1px solid ${c.border}` }}>
              <div className="flex justify-between items-center mb-4">
                <h4 className="font-display text-xl font-bold" style={{ color: c.ink }}>The Triangle</h4>
                <button onClick={reset} className="font-mono text-xs flex items-center gap-1 px-2 py-1 hover:opacity-80"
                  style={{ color: c.gold, border: `1px solid ${c.gold}` }}>
                  <RotateCcw size={12} /> RESET

              </div>
              <Slider value={aperture} min={1.4} max={16} step={0.1} onChange={setAperture}
                label="Aperture (f/)" displayValue={`f/${aperture.toFixed(1)}`} displayUnit="" />
              <Slider value={shutterIdx} min={0} max={shutterValues.length - 1} step={1} onChange={setShutterIdx}
                label="Shutter Speed" displayValue={shutterLabels[shutterIdx]} displayUnit="sec" />
              <Slider value={iso} min={0} max={isoValues.length - 1} step={1} onChange={setIso}
                label="ISO" displayValue={`ISO ${isoVal}`} displayUnit="" />
              <div className="mt-6 pt-4 border-t font-body text-sm space-y-2"
                style={{ borderColor: c.border, color: c.inkSoft }}>
                <div><strong style={{ color: c.gold }}>Try this:</strong> Open aperture to f/1.8 → too bright? Speed up shutter or drop ISO.</div>
                <div><strong style={{ color: c.gold }}>Or this:</strong> Need to freeze action at 1/2000? Open aperture or raise ISO to compensate.</div>
              </div>
            </div>
          </div>
        </div>
      );

    // ========================================================================

                  let bg = 'transparent', border = c.border;

                  return (
                    <button key={oi} onClick={() => !isAnswered && choose(qi, oi)} disabled={isAnswered}

                      style={{ background: bg, border: `1px solid ${border}`, color: c.ink, cursor: isAnswered ? 'default' : 'pointer' }}>
                      <span>{opt}</span>
                      {isAnswered && isCorrect && <Check size={18} color="#3a6b3a" />}
                      {isAnswered && isChosen && !isCorrect && <X size={18} color={c.rust} />}
                    </button>
                  );

              {revealed[qi] && (
                <div className="mt-3 p-3 font-body text-sm italic rounded-sm"
                  style={{ background: 'rgba(200,160,77,0.1)', color: c.inkSoft, borderLeft: `3px solid ${c.gold}` }}>

            <div className="text-center mt-8 p-6 rounded-sm" style={{ background: c.ink, color: c.cream }}>
              <div className="font-mono text-xs tracking-[0.3em] mb-2" style={{ color: c.goldBright }}>✦ FINAL SCORE ✦</div>
              <div className="font-display text-5xl font-bold mb-2" style={{ color: c.goldBright }}>{score} / {questions.length}</div>
            </div>
          )}
        </div>
      );
    };

    // ========================================================================

    const AudioLevelMeter = () => {
      const [voice, setVoice] = useState(50);
      const [gain, setGain] = useState(50);
      const combined = (voice * gain) / 100;
      const dB = combined <= 0 ? -60 : 20 * Math.log10(combined / 100);
      const displayDB = Math.max(-48, Math.min(3, dB));
      
      let zone, zoneColor, zoneMsg;
      if (displayDB > 0) { zone = 'CLIPPING'; zoneColor = '#c82020'; zoneMsg = 'Audio is destroyed. Permanent distortion.'; }
      else if (displayDB > -3) { zone = 'HOT'; zoneColor = '#d4844c'; zoneMsg = 'Too loud. One laugh and you clip.'; }
      else if (displayDB > -12) { zone = 'SWEET SPOT'; zoneColor = '#3a7b3a'; zoneMsg = 'Perfect. You have headroom for loud moments.'; }
      else if (displayDB > -30) { zone = 'QUIET'; zoneColor = '#888888'; zoneMsg = 'Too low. Boosting in post will amplify noise.'; }
      else { zone = 'SILENCE'; zoneColor = '#555555'; zoneMsg = 'Nothing is registering.'; }

      const bars = [];
      for (let i = 0; i < 30; i++) {
        const barDB = -48 + (i * 51) / 29;
        const lit = displayDB >= barDB;
        let color = '#3a7b3a';
        if (barDB >= 0) color = '#c82020';
        else if (barDB >= -3) color = '#d4844c';
        else if (barDB >= -12) color = '#b8a03c';
        bars.push({ barDB, lit, color });
      }

      return (
        <div className="my-8 max-w-3xl mx-auto">
          <div className="grid md:grid-cols-[200px_1fr] gap-6 items-stretch">
            <div className="rounded-sm border-2 p-4 flex flex-col items-center" 
              style={{ borderColor: c.ink, background: '#0a0805', minHeight: '320px' }}>
              <div className="font-mono text-[10px] mb-2" style={{ color: c.goldBright }}>dB</div>
              <div className="flex-1 flex flex-col-reverse gap-0.5 w-full" style={{ maxWidth: '80px' }}>
                {bars.map((b, i) => (
                  <div key={i} className="relative h-2 flex items-center">
                    <div className="flex-1 transition-all duration-75" 
                      style={{ height: '100%', background: b.lit ? b.color : '#1a1410', opacity: b.lit ? 1 : 0.3 }} />
                    {(b.barDB === 0 || (b.barDB <= -11.5 && b.barDB >= -12.5) || (b.barDB <= -23 && b.barDB >= -25)) && (
                      <div className="absolute -right-10 font-mono text-[8px] whitespace-nowrap" style={{ color: '#888' }}>
                        {b.barDB.toFixed(0)}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <div className="font-mono text-lg mt-3 font-bold" style={{ color: zoneColor }}>
                {displayDB.toFixed(1)}
              </div>
            </div>
            
            <div className="p-5 rounded-sm" style={{ background: c.paper, border: `1px solid ${c.border}` }}>

        { id: 'pan', label: 'Pan', when: 'Following a moving subject horizontally, or revealing a landscape.', transform: 'pan', caution: 'Pan slowly. Fast pans cause motion blur and nausea. Stop smoothly, don\'t snap.' },
        { id: 'tilt', label: 'Tilt', when: 'Revealing height (tall building, person standing up), or emotional emphasis.', transform: 'tilt', caution: 'Used sparingly. Overuse looks like you\'re fidgeting with the camera.' },
        { id: 'push', label: 'Push In', when: 'Escalating intensity or emotion — a key moment in a story.', transform: 'push', caution: 'CAMERA movement, not a zoom. Physically move the camera closer (or use a gimbal).' },
        { id: 'pull', label: 'Pull Out', when: 'Revealing context, ending a scene, emotional release after intensity.', transform: 'pull', caution: 'Natural wrap-up movement. Pairs with music swells and scene endings.' },
        { id: 'handheld', label: 'Handheld', when: 'Documentary, action, chase scenes. Conveys immediacy or unease.', transform: 'handheld', caution: 'Micro-movements are OK; big jitters make viewers queasy. Use a stabilizer or shoot in Active SteadyShot.' },
      ];
      
      const [sel, setSel] = useState('static');
      const current = moves.find(m => m.id === sel);
      const [tick, setTick] = useState(0);
      
      useEffect(() => {
        const int = setInterval(() => setTick(t => t + 1), 40);
        return () => clearInterval(int);
      }, []);
      
      const t = (tick % 150) / 150;
      const ease = 0.5 - 0.5 * Math.cos(t * Math.PI * 2);
      
      let translateX = 0, translateY = 0, scale = 1;
      if (current.transform === 'pan') translateX = (ease - 0.5) * 80;
      else if (current.transform === 'tilt') translateY = (ease - 0.5) * 60;
      else if (current.transform === 'push') scale = 1 + ease * 0.4;
      else if (current.transform === 'pull') scale = 1.4 - ease * 0.4;
      else if (current.transform === 'handheld') {
        translateX = Math.sin(tick * 0.4) * 4 + Math.sin(tick * 0.27) * 2;
        translateY = Math.cos(tick * 0.3) * 3 + Math.sin(tick * 0.51) * 2;
      }

      return (
        <div className="my-8 max-w-4xl mx-auto">

                className="p-3 rounded-sm text-center transition-all"
                style={{ background: sel === m.id ? c.ink : c.paper, color: sel === m.id ? c.cream : c.ink, border: `1px solid ${sel === m.id ? c.gold : c.border}` }}>

              <div style={{
                position: 'absolute', inset: 0,
                transform: `translate(${translateX}px, ${translateY}px) scale(${scale})`, 
                transformOrigin: '50% 50%',
                transition: current.transform === 'handheld' ? 'none' : 'transform 0.03s linear'
              }}>
                <svg viewBox="0 0 400 225" className="w-full h-full">

                </svg>
              </div>
              <div className="absolute top-2 left-2 font-mono text-[10px] px-2 py-1 rounded-sm"

            <div className="p-5 rounded-sm" style={{ background: c.paper, border: `1px solid ${c.border}` }}>

                <p className="font-body text-sm" style={{ color: c.inkSoft }}>{current.caution}</p>

                  <span style={{ color: c.inkSoft }}>Open-source, incredibly lightweight, and free. It uses virtually zero CPU overhead, ensuring your stream doesn&apos;t crash. Every piece of hardware works with it out of the box. Start here. End here.</span>
                </div>
                
                <div className="p-6 rounded border-l-4" style={{ background: 'rgba(255,255,255,0.5)', borderColor: c.inkSoft, borderRight: `1px solid ${c.border}`, borderTop: `1px solid ${c.border}`, borderBottom: `1px solid ${c.border}` }}>
                  <strong className="font-display text-xl block mb-2">Streamlabs / Prism Live</strong>
                  <span style={{ color: c.inkSoft }}>Streamlabs is OBS with a heavier UI and built-in alerts. Prism Live is fantastic for multi-streaming to multiple platforms for free. They are &quot;easier&quot; to set up initially, but they consume far more CPU than basic OBS.</span>
                </div>
              </div>
              
              <h4 className="font-display text-2xl font-bold mb-4">The Overlay Secret</h4>
              <p>
                Do not build your stream graphics inside the broadcasting software. Use browser sources. Build your overlays in <strong className="text-black">Canva</strong> or <strong className="text-black">Figma</strong>, export them as transparent PNGs, or use a free tool like <strong className="text-black">StreamElements</strong> to handle all alerts entirely on the cloud. This keeps your local processing power focused on camera encoding.
              </p>
            </div>
          </section>

          <section className="max-w-3xl mx-auto px-5 md:px-8 py-12 md:py-16">
            <div className="p-6 md:p-8 rounded-sm text-center" style={{ background: c.ink, color: c.cream }}>
              <div className="font-mono text-[10px] tracking-[0.3em] mb-3" style={{ color: c.goldBright }}>
                ✦ YOU&apos;VE REACHED THE TRUE END ✦
              </div>
              <h3 className="font-display text-3xl md:text-4xl font-bold mb-4" style={{ color: c.goldBright }}>
                Inner Peace is Publishing
              </h3>
              <p className="font-body italic text-base md:text-lg max-w-xl mx-auto" style={{ color: c.cream, opacity: 0.85 }}>
                You now understand how your camera sees light, color, framing, and motion. You have the precise settings saved in your memory dial. You have chosen software that respects your time. The friction is gone. Your only job now is to record and publish.
              </p>
            </div>
          </section>
          
          <div className="h-24"></div>
        </div>
      );
    };

    // ========================================================================
    // FOOTER
    // ========================================================================
    const Footer = () => (
      <footer className="text-center py-12 px-5 mt-12 border-t" style={{ borderColor: c.border }}>
        <div className="ornament font-mono text-[10px] tracking-[0.3em]" style={{ color: c.gold }}>
          NOW GO SHOOT SOMETHING
        </div>
        <div className="font-display italic mt-3 text-sm" style={{ color: c.inkSoft }}>
          The Camera Course · A ten-volume curriculum for YouTube · Built for Sony ZV-E10
        </div>
      </footer>
    );

    // ========================================================================
    // APP WITH HASH ROUTING
    // ========================================================================
    function App() {
      const [route, setRoute] = useState(window.location.hash || '#/');

      useEffect(() => {
        const onHashChange = () => {
          setRoute(window.location.hash || '#/');
          window.scrollTo({ top: 0, behavior: 'instant' });
        };
        window.addEventListener('hashchange', onHashChange);
        return () => window.removeEventListener('hashchange', onHashChange);
      }, []);

      const navigate = (hash) => {
        window.location.hash = hash;
      };

      return (
        <div className="min-h-screen relative" style={{ background: c.cream, color: c.ink }}>
          <div className="grain" />
          <Nav route={route} navigate={navigate} />
          {(route === '#/' || route === '') && <Hub navigate={navigate} />}
          {route === '#/optics' && <OpticsPrimer />}
          {route === '#/color' && <ColorPrimer />}
          {route === '#/setup' && <SetupWizard />}
          {route === '#/audio' && <AudioCourse />}
          {route === '#/lighting' && <LightingCourse />}
          {route === '#/composition' && <CompositionCourse />}
          {route === '#/movement' && <MovementCourse />}
          {route === '#/studio' && <StudioCourse />}
          {route === '#/presence' && <PresenceCourse />}
          {route === '#/video' && <VideoCourse />}
          <FloatingLessonNav route={route} navigate={navigate} />
          <Footer />
        </div>
      );
    }

    // Hide the loader and mount React
    document.getElementById('loader').style.display = 'none';
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
